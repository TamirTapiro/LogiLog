name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Run unit tests across a matrix of OS and Node versions before publishing
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache LogiLog embedding model
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/logilog
          key: logilog-model-v1-${{ runner.os }}
          restore-keys: |
            logilog-model-v1-
      - name: Run unit tests
        run: npm test
      - name: Run Node.js integration tests
        run: npm run test:node
        env:
          LOGILOG_CACHE_DIR: ~/.cache/logilog

  # Build the npm package artifact with tsup
  build:
    name: Build (tsup)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build:pkg
      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-contents.txt
          # Fail if src/ files are included in the published package
          grep -v "^npm notice" pack-contents.txt | grep "src/" && exit 1 || true
      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Publish to npm after test and build pass
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      id-token: write  # Required for npm provenance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
