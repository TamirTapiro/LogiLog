version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-deps:
        patterns:
          - "*"
        dependency-type: development
      prod-deps:
        patterns:
          - "*"
        dependency-type: production

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
